name: Weekly SEO Redeploy

on:
  schedule:
    # Jeden Montag um 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Manuell auslösbar

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
